<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#151a16">
  <meta name="description" content="Private Fitness-Tracking-PWA für Gewicht, Ernährung und Körperfett.">
  <title>Fitness Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="icon" href="assets/icons/app-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-header-content">
        <div>
          <p class="eyebrow">Performance log</p>
          <h1 id="view-title">Dashboard</h1>
        </div>
        <div class="app-header-actions">
          <span class="version-pill" id="app-version">v--</span>
          <button class="update-button" type="button" id="app-update-button">Update</button>
        </div>
      </div>
    </header>

    <div id="app-status" class="app-status" role="status" aria-live="polite" hidden></div>

    <main id="app-view" class="app-main" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="Hauptnavigation">
      <a class="nav-item" href="#/dashboard" data-route="dashboard" aria-current="page">
        <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 10.8 12 3l9 7.8"></path><path d="M5.5 9.5V21h13V9.5M9 21v-6h6v6"></path></svg></span>
        <span>Heute</span>
      </a>
      <a class="nav-item" href="#/daily" data-route="daily">
        <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><path d="M12 8v8M8 12h8"></path></svg></span>
        <span>Eintragen</span>
      </a>
      <a class="nav-item" href="#/training" data-route="training">
        <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M6 9v6M3.5 10.5v3M18 9v6M20.5 10.5v3M6 12h12"></path></svg></span>
        <span>Training</span>
      </a>
      <a class="nav-item" href="#/trends" data-route="trends">
        <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 19V5M4 19h16"></path><path d="m7 15 4-4 3 2 5-6"></path></svg></span>
        <span>Trends</span>
      </a>
      <a class="nav-item" href="#/settings" data-route="settings">
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M12 8.5a3.5 3.5 0 1 1 0 7 3.5 3.5 0 0 1 0-7Z"></path>
            <path
              d="M19.4 13.5a7.8 7.8 0 0 0 .1-1.5 7.8 7.8 0 0 0-.1-1.5l2-1.5-2-3.4-2.4 1a8.2 8.2 0 0 0-2.6-1.5L14 2.5h-4l-.4 2.6A8.2 8.2 0 0 0 7 6.6l-2.4-1-2 3.4 2 1.5a7.8 7.8 0 0 0-.1 1.5 7.8 7.8 0 0 0 .1 1.5l-2 1.5 2 3.4 2.4-1a8.2 8.2 0 0 0 2.6 1.5l.4 2.6h4l.4-2.6a8.2 8.2 0 0 0 2.6-1.5l2.4 1 2-3.4-2-1.5Z">
            </path>
          </svg>
        </span>
        <span>Mehr</span>
      </a>
    </nav>
  </div>

  <script src="vendor/chartjs/chart.umd.min.js" defer></script>
  <script type="module" src="js/app.js"></script>
</body>

</html>
