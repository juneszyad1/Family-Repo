<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="description" content="Private Fitness-Tracking-PWA für Gewicht, Ernährung und Körperfett.">
  <title>Fitness Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="icon" href="assets/icons/app-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Fitness Tracker</p>
        <h1 id="view-title">Dashboard</h1>
      </div>
      <div class="app-header-actions">
        <span class="version-pill" id="app-version">v--</span>
        <button class="update-button" type="button" id="app-update-button">Update</button>
      </div>
    </header>

    <div id="app-status" class="app-status" role="status" aria-live="polite" hidden></div>

    <main id="app-view" class="app-main" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="Hauptnavigation">
      <a class="nav-item" href="#/dashboard" data-route="dashboard" aria-current="page">
        <span class="nav-icon" aria-hidden="true">⌂</span>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" href="#/daily" data-route="daily">
        <span class="nav-icon" aria-hidden="true">＋</span>
        <span>Tagesdaten</span>
      </a>
      <a class="nav-item" href="#/trends" data-route="trends">
        <span class="nav-icon" aria-hidden="true">⌁</span>
        <span>Trends</span>
      </a>
      <a class="nav-item" href="#/goals" data-route="goals">
        <span class="nav-icon" aria-hidden="true">◎</span>
        <span>Ziele</span>
      </a>
      <a class="nav-item" href="#/settings" data-route="settings">
        <span class="nav-icon" aria-hidden="true">⚙</span>
        <span>Einstellungen</span>
      </a>
    </nav>
  </div>

  <script src="vendor/chartjs/chart.umd.min.js" defer></script>
  <script type="module" src="js/app.js"></script>
</body>

</html>
